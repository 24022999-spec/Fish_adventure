<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vượt qua con đường nguy hiểm</title>
  <link rel="stylesheet" href="./src/style.css" />

  <!-- Import map: cho browser biết resolve "three" từ CDN (vì files trong public/ không qua Vite bundler) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.176.0",
      "three/examples/jsm/loaders/GLTFLoader.js": "https://esm.sh/three@0.176.0/examples/jsm/loaders/GLTFLoader.js",
      "three/examples/jsm/utils/SkeletonUtils.js": "https://esm.sh/three@0.176.0/examples/jsm/utils/SkeletonUtils.js"
    }
  }
  </script>
</head>
<body>
  <!-- Game Over screen -->
  <div id="result-container">
    <div id="result">
      <h2 style="margin-bottom:16px">GAME OVER</h2>
      <button id="restart-btn">RESTART</button>
    </div>
  </div>

  <!-- Win screen -->
  <div id="win-container">
    <div id="win-box">
      <h2>MISSION SUCCESS!</h2>
      <img id="win-image" src="" alt="" style="display:none" />
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
