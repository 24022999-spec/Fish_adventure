<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Darwin's Adventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }

    /* ── START SCREEN ── */
    #start-screen {
      position: fixed; inset: 0; z-index: 100;
    }
    #start-canvas-container {
      position: absolute; inset: 0;
    }
    #menu-container {
      position: absolute; top: 80%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex; justify-content: center;
      align-items: center; gap: 80px;
      font-family: 'Press Start 2P', monospace;
      z-index: 10;
    }
    .menu-item {
      font-size: 22px; cursor: pointer;
      color: #50b9ff;
      text-shadow: 2px 2px #000;
      transition: transform 0.2s, color 0.2s;
      user-select: none;
    }
    .menu-item:hover { transform: scale(1.15); color: #f9f265; }

    /* ── INTRO POPUP ── */
    #intro-popup {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6);
    }
    .pop-up-box {
      position: relative;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: inline-block;
      max-width: 90%; max-height: 90%;
    }
    .pop-up-image {
      max-width: 100%;
      max-height: 90vh;
      display: block; margin: 0 auto;
    }
    #close-btn {
      position: absolute; top: -15px; right: -15px;
      font-size: 24px; background: #fff;
      border: 4px solid #333;
      width: 36px; height: 36px;
      line-height: 32px; text-align: center;
      cursor: pointer; font-weight: bold;
      color: #50b9ff;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
      user-select: none;
    }
    #close-btn:hover { color: #000; background: #ffaaaa; }

    /* ── GAME HUD (ẩn cho đến khi game bắt đầu) ── */
    #hud {
      display: none;
      position: fixed; top: 16px; left: 16px;
      color: #fff; font-family: sans-serif;
      pointer-events: none; user-select: none;
    }
    #score-display { font-size: 22px; font-weight: bold; }
    #height-display { font-size: 14px; opacity: 0.8; margin-top: 4px; }
    #fps-display {
      font-size: 13px; font-family: monospace;
      background: rgba(0,0,0,0.45); padding: 5px 9px;
      border-radius: 5px; margin-top: 8px;
      color: #a0ffb0; letter-spacing: 0.5px;
    }

    #charge-wrap {
      display: none;
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      flex-direction: column; align-items: center;
      gap: 6px; pointer-events: none;
    }
    #charge-label { color: #fff; font-size: 13px; font-family: sans-serif; }
    #charge-bg {
      width: 200px; height: 14px;
      background: rgba(255,255,255,0.2);
      border-radius: 7px; overflow: hidden;
    }
    #charge-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      border-radius: 7px;
      transition: width 0.05s linear;
    }
  </style>
</head>
<body>

  <!-- ── START SCREEN ── -->
  <div id="start-screen">
    <div id="start-canvas-container"></div>
    <div id="menu-container">
      <div id="start-btn"  class="menu-item">START</div>
      <div id="intro-btn"  class="menu-item">INTRODUCTION</div>
    </div>
  </div>

  <!-- ── INTRO POPUP ── -->
  <div id="intro-popup">
    <div class="pop-up-box">
      <span id="close-btn">&times;</span>
      <img src="/pop-up.png" alt="Introduction" class="pop-up-image" />
    </div>
  </div>

  <!-- ── GAME HUD ── -->
  <div id="hud">
    <div id="score-display">🍩 0</div>
    <div id="height-display">Cao: 0m</div>
    <div id="fps-display">FPS: --</div>
  </div>

  <div id="charge-wrap">
    <div id="charge-label">BOOST</div>
    <div id="charge-bg"><div id="charge-bar"></div></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
